<header class="topbar fixed top-0 right-7 z-[90] h-[var(--topbar-height)]
               flex items-center justify-between
               bg-[var(--surface-topbar)] backdrop-blur-md
               border-b border-[var(--border-subtle)]"
        [class.sidebar-collapsed]="sidebarState.collapsed()">

  <!-- ══ Left: toggle + title ══════════════════════════════════════ -->
  <div class="flex items-center gap-3 pl-3 pr-5">

    <button
      class="topbar-icon-btn shrink-0"
      (click)="sidebarState.toggle()"
      [attr.aria-label]="sidebarState.collapsed() ? 'Expand sidebar' : 'Collapse sidebar'">
      @if (sidebarState.collapsed()) {
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 4.5h12M2 8.5h12M2 12.5h12"
                stroke="currentColor" stroke-width="1.65" stroke-linecap="round"/>
        </svg>
      } @else {
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10.5 3L5.5 8L10.5 13"
                stroke="currentColor" stroke-width="1.65"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      }
    </button>

    <div class="w-px h-5 bg-[var(--border-default)] shrink-0"></div>

    <span class="text-[0.9375rem] font-semibold tracking-[-0.02em]
                 text-[var(--text-primary)] whitespace-nowrap select-none">
      Workflow Orchestration System
    </span>

  </div>

  <!-- ══ Right: controls ══════════════════════════════════════════ -->
  <div class="flex items-center gap-1 pr-4">

    <!-- Notification -->
    <app-notification-panel />

    <!-- Theme toggle -->
    <button
      class="topbar-icon-btn"
      (click)="themeService.toggle()"
      [attr.aria-label]="themeService.theme() === 'dark' ? 'Light mode' : 'Dark mode'">
      @if (themeService.theme() === 'dark') {
        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" clip-rule="evenodd"
                d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/>
        </svg>
      } @else {
        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
          <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
        </svg>
      }
    </button>

    <!-- Divider -->
    <div class="w-px h-5 bg-[var(--border-default)] shrink-0 mx-1"></div>

    <!-- Instance pill + dropdown ─────────────────────────────── -->
    <div class="relative shrink-0" data-inst-wrapper>

      <button
        class="instance-pill"
        [class.is-open]="dropdownOpen"
        [attr.data-inst]="instanceService.tenantId()"
        (click)="toggleDropdown()">

        <span class="inst-dot"></span>

        <span class="inst-info">
          <span class="inst-id">{{ instanceService.tenantId() ?? '—' }}</span>
          <span class="inst-user">{{ instanceService.username() ?? '' }}</span>
        </span>

        <svg class="inst-chevron" [class.rotated]="dropdownOpen"
             width="11" height="11" viewBox="0 0 12 12" fill="none">
          <path d="M2.5 4.5L6 8L9.5 4.5" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <!-- Dropdown ─────────────────────────────────────────── -->
      @if (dropdownOpen) {
        <div class="inst-dropdown" [attr.data-inst]="instanceService.tenantId()">

          <!-- Header -->
          <div class="inst-dd-header">
            <span class="inst-dd-label">Active Instance</span>
            <div class="inst-dd-instance">
              <span class="inst-dot-sm" [attr.data-inst]="instanceService.tenantId()"></span>
              <span class="inst-dd-id">{{ instanceService.tenantId() ?? '—' }}</span>
            </div>
          </div>

          <!-- Sign out row -->
          <button class="inst-signout-btn" (click)="openLogoutModal()">
            <span class="inst-signout-icon">
              <svg width="13" height="13" viewBox="0 0 14 14" fill="none"
                   stroke="currentColor" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5.5 2H3.5a1 1 0 00-1 1v8a1 1 0 001 1h2"/>
                <path d="M9 10l3-3-3-3M12 7H5.5"/>
              </svg>
            </span>
            Sign out
          </button>

        </div>
      }

    </div>
  </div>
</header>

<!-- ══ Logout confirmation modal ════════════════════════════════════ -->
@if (logoutModalOpen) {
  <div class="logout-backdrop" (click)="closeLogoutModal()">

    <div class="logout-modal" (click)="$event.stopPropagation()">

      <div class="logout-modal-bar"></div>

      <div class="logout-modal-body">

        <div class="logout-modal-header">
          <div class="logout-modal-icon">
            <svg width="19" height="19" viewBox="0 0 16 16" fill="none"
                 stroke="#ef4444" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 2H4a1.5 1.5 0 00-1.5 1.5v9A1.5 1.5 0 004 14h2"/>
              <path d="M10.5 11L14 8l-3.5-3M14 8H6"/>
            </svg>
          </div>

          <div class="logout-modal-text">
            <h3 class="logout-modal-title">Sign out of instance?</h3>
            <p class="logout-modal-desc">
              You'll be returned to instance selection. Your session for
              <span class="logout-inst-tag"
                    [attr.data-inst]="instanceService.tenantId()">{{ instanceService.tenantId() }}</span>
              will end.
            </p>
          </div>
        </div>

        <div class="logout-modal-divider"></div>

        <div class="logout-modal-actions">
          <button class="logout-btn-cancel" (click)="closeLogoutModal()">Cancel</button>
          <button class="logout-btn-confirm" (click)="confirmLogout()">Sign out</button>
        </div>

      </div>
    </div>
  </div>
}
