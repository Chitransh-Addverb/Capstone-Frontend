<header class="topbar">

  <!-- Left -->
  <div class="topbar-left">
    <div class="page-context">
      <span class="page-title">Workflow Orchestration System</span>
    </div>
  </div>

  <!-- Right -->
  <div class="topbar-right">

    <!-- Notification Panel -->
    <app-notification-panel />

    <!-- Theme Toggle -->
    <button
      class="theme-toggle"
      (click)="themeService.toggle()"
      [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
    >
      <div class="toggle-track" [class.dark]="themeService.theme() === 'dark'">
        <div class="toggle-thumb">
          @if (themeService.theme() === 'dark') {
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor">
              <path d="M8.5 6.5A4.5 4.5 0 013.5 1.5a4.5 4.5 0 100 7 4.5 4.5 0 005-2z"/>
            </svg>
          } @else {
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"
                 stroke="currentColor" stroke-width="1.2">
              <circle cx="5" cy="5" r="2"/>
              <path d="M5 1v1M5 8v1M1 5h1M8 5h1M2.2 2.2l.7.7M7.1 7.1l.7.7M7.8 2.2l-.7.7M2.9 7.1l-.7.7"/>
            </svg>
          }
        </div>
      </div>
    </button>

    <div class="separator"></div>

    <!-- Instance / User area -->
    <div class="instance-area">

      <!-- Current instance pill -->
      <div class="instance-pill" [attr.data-inst]="instanceService.tenantId()">
        <div class="instance-dot"></div>
        <div class="instance-pill-info">
          <span class="instance-pill-label">
            {{ instanceService.tenantId() ?? '—' }}
          </span>
          <span class="instance-pill-user">
            {{ instanceService.username() ?? '' }}
          </span>
        </div>
      </div>

      <!-- Change Instance button -->
      <button class="change-btn" (click)="changeInstance()" title="Change instance">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M1 7A6 6 0 0112.5 4M13 7A6 6 0 011.5 10M1 4v3h3M13 10v-3h-3"/>
        </svg>
        <span>Change</span>
      </button>

    </div>

  </div>
</header>
