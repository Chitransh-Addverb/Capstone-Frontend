<header class="topbar">

  <!-- Left -->
  <div class="topbar-left">
    <div class="page-context">
      <span class="page-title">Workflow Orchestration System</span>
      <span class="page-version">v1.0</span>
    </div>
  </div>

  <!-- Right -->
  <div class="topbar-right">

    <!-- Engine status -->
    <div class="engine-status">
      <span class="engine-dot"></span>
      <span class="engine-label">Engine Active</span>
    </div>

    <div class="separator"></div>

    <!-- Notification Panel -->
    <app-notification-panel />

    <!-- Theme Toggle -->
    <button
      class="theme-toggle"
      (click)="themeService.toggle()"
      [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
    >
      <div class="toggle-track" [class.dark]="themeService.theme() === 'dark'">
        <div class="toggle-thumb">
          @if (themeService.theme() === 'dark') {
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor">
              <path d="M8.5 6.5A4.5 4.5 0 013.5 1.5a4.5 4.5 0 100 7 4.5 4.5 0 005-2z"/>
            </svg>
          } @else {
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"
                 stroke="currentColor" stroke-width="1.2">
              <circle cx="5" cy="5" r="2"/>
              <path d="M5 1v1M5 8v1M1 5h1M8 5h1M2.2 2.2l.7.7M7.1 7.1l.7.7M7.8 2.2l-.7.7M2.9 7.1l-.7.7"/>
            </svg>
          }
        </div>
      </div>
    </button>

    <div class="separator"></div>

    <!-- User -->
    <button class="user-btn" aria-label="User menu">
      <div class="user-avatar">
        <span>DC</span>
      </div>
      <div class="user-info">
        <span class="user-name">Dev C</span>
        <span class="user-role">Frontend Owner</span>
      </div>
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M2 4l4 4 4-4"/>
      </svg>
    </button>

  </div>
</header>
